<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor WebP - Biblioteca IPEN</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        :root {
            --azul-ipen-dark: #003399;
            --azul-ipen-light: #00AEEF;
            --cinza-fundo: #f4f7f9;
            --texto: #2d3748;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: var(--cinza-fundo); 
        }

        .card { 
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; 
            width: 100%; max-width: 450px; border-top: 6px solid var(--azul-ipen-dark);
        }

        .logo-ipen { max-width: 180px; margin-bottom: 15px; }
        h2 { color: var(--azul-ipen-dark); margin: 0 0 5px 0; }
        p.subtitle { color: #718096; margin-bottom: 30px; font-size: 14px; }

        .drop-zone {
            border: 2px dashed #cbd5e0; border-radius: 8px; padding: 30px 20px;
            background: #f8fafc; cursor: pointer; transition: all 0.3s ease; margin-bottom: 25px;
        }

        .drop-zone:hover { border-color: var(--azul-ipen-light); background: #edf2f7; }
        .drop-zone__icon { font-size: 40px; display: block; margin-bottom: 10px; }

        button { 
            background: var(--azul-ipen-dark); color: white; border: none; 
            padding: 14px 20px; border-radius: 6px; cursor: pointer; 
            font-size: 16px; font-weight: 600; width: 100%; 
        }

        button:disabled { background: #cbd5e0; cursor: not-allowed; }

        #progress-container { 
            display: none; width: 100%; background-color: #edf2f7; 
            border-radius: 50px; margin-top: 20px; height: 26px; 
            position: relative; overflow: hidden;
        }

        #progress-bar { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--azul-ipen-dark), var(--azul-ipen-light)); 
            transition: width 0.2s ease; 
        }

        #percent-text { 
            position: absolute; width: 100%; top: 5px; 
            font-size: 12px; font-weight: bold; color: var(--texto); 
        }

        .footer {
            margin-top: 30px; font-size: 11px; color: #a0aec0;
            border-top: 1px solid #edf2f7; padding-top: 15px;
        }

        .success-msg { color: #28a745; font-weight: bold; display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo_ipen.png" alt="IPEN" class="logo-ipen" onerror="this.style.display='none'">
        <h2>Conversor de Imagens</h2>
        <p class="subtitle">Ferramenta Exclusiva da Biblioteca IPEN</p>

        <form id="uploadForm">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <span class="drop-zone__icon">📁</span>
                <span id="fileLabel">Clique ou arraste as imagens aqui</span>
                <input type="file" name="files" id="fileInput" accept="image/*" multiple required style="display: none;">
            </div>
            <button type="submit" id="btnConverter">Converter e Baixar .ZIP</button>
        </form>

        <div id="progress-container">
            <div id="progress-bar"></div>
            <div id="percent-text">0%</div>
        </div>

        <div id="successMsg" class="success-msg">✓ Conversão concluída!</div>
        
        <button id="btnReset" onclick="location.reload()" style="display:none; background:#718096; margin-top:15px;">Novo Upload</button>

        <div class="footer">
            INSTITUTO DE PESQUISAS ENERGÉTICAS E NUCLEARES <br>
            Comissão Nacional de Energia Nuclear (CNEN)
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const percentText = document.getElementById('percent-text');
        const btnConverter = document.getElementById('btnConverter');
        const btnReset = document.getElementById('btnReset');
        const successMsg = document.getElementById('successMsg');

        // Atualiza nome dos arquivos selecionados
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileLabel.innerHTML = `<strong>${fileInput.files.length} arquivo(s) selecionado(s)</strong>`;
            }
        });

        uploadForm.onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(uploadForm);
            const xhr = new XMLHttpRequest();

            // Configuração da interface
            btnConverter.disabled = true;
            btnConverter.style.display = 'none';
            progressContainer.style.display = 'block';
            document.getElementById('dropZone').style.opacity = '0.5';

            // Escuta o progresso do UPLOAD
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    // Vamos usar até 99% para o upload, 100% apenas quando o servidor responder
                    const visualPercent = Math.min(percent, 99); 
                    progressBar.style.width = visualPercent + '%';
                    percentText.innerText = 'Enviando e Convertendo... ' + visualPercent + '%';
                }
            });

            // Quando o servidor terminar de processar
            xhr.onload = function() {
                if (xhr.status === 200) {
                    progressBar.style.width = '100%';
                    percentText.innerText = 'Concluído 100%';
                    successMsg.style.display = 'block';
                    btnReset.style.display = 'block';

                    // Disparar o download do ZIP automaticamente
                    const blob = new Blob([xhr.response], { type: 'application/zip' });
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = 'imagens_convertidas_ipen.zip';
                    link.click();
                } else {
                    alert('Erro na conversão. Verifique os arquivos.');
                    location.reload();
                }
            };

            // Define que esperamos um arquivo (blob) como resposta
            xhr.responseType = 'blob';
            xhr.open('POST', '/', true); // Certifique-se que a rota '/' é a que processa no seu Flask
            xhr.send(formData);
        };
    </script>
</body>
</html>
